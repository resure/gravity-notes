name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # The single-file build has its own bundling path (inlined assets + ASCII charset
      # workaround); exercise it so a regression there can't ship unnoticed.
      - run: npm run build:single

  # The desktop shell's Rust backend (`src-tauri`) carries the ONLY path-traversal containment
  # defense (`resolve_within`) and its fs primitives. Without this job those safety tests never run
  # in CI, so a containment regression could ship green. The traversal/fs tests are platform-neutral,
  # so they run on Linux (the macOS-only `reveal`/`open_external` paths are `#[cfg]`-gated out here).
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Tauri's crate links against the system WebKitGTK/GTK stack even to compile the test binary.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev patchelf
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
