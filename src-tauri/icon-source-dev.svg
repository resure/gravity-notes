<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24262D"/>
      <stop offset="1" stop-color="#141620"/>
    </linearGradient>

    <!-- blue disc, lit from the top (sibling of the orange prod disc), centered on #1f81ff -->
    <linearGradient id="disc" x1="512" y1="216" x2="512" y2="808" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4D9BFF"/>
      <stop offset="1" stop-color="#0A6BF0"/>
    </linearGradient>

    <!-- whisper of bloom so it still reads "supernova", not just a flat dot -->
    <radialGradient id="glow" cx="512" cy="512" r="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4D9BFF" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#1f81ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1f81ff" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="sq">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>
  </defs>

  <!-- dark body fills the whole squircle -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#body)"/>

  <g clip-path="url(#sq)">
    <!-- faint bloom -->
    <rect x="100" y="100" width="824" height="824" fill="url(#glow)"/>
    <!-- the blue sun -->
    <circle cx="512" cy="512" r="296" fill="url(#disc)"/>
  </g>

  <rect x="101" y="101" width="822" height="822" rx="184" ry="184" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
</svg>
